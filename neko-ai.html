
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Woof AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* CSS styles */
    </style>
</head>
<body>
    <header>
        <div class="logo"><i class="fa-solid fa-dog"></i> Woof AI</div>
        <div class="controls">
            <button onclick="clearHistory()"><i class="fa-solid fa-rotate-right"></i> Reset Chat</button>
            <button onclick="updateApiKey()"><i class="fa-solid fa-key"></i> Cài Key</button>
        </div>
    </header>

    <div id="chat-wrapper">
        <div id="woof-bg" class="neko-watermark">
            <i class="fa-solid fa-dog"></i>
            <span>WOOF AI</span>
        </div>
        <div id="chat-container"></div>
    </div>

    <div class="input-area">
        <div id="preview-container">
            <img id="preview-img" src="" alt="Preview">
            <i class="fa-solid fa-circle-xmark" id="remove-preview" onclick="clearImagePreview()"></i>
        </div>

        <div class="input-wrapper">
            <button class="icon-btn file-btn" onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-folder-open"></i></button>
            <input type="file" id="file-input" accept="image/*,text/plain,.js,.html,.css,.txt" onchange="handleFileInput(event)">
            
            <button class="icon-btn camera-btn" onclick="startCamera()"><i class="fa-solid fa-camera"></i></button>

            <textarea id="user-input" placeholder="Nhập tin nhắn, chụp ảnh..."></textarea>
            <button class="icon-btn send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // JavaScript code
    </script>
</body>
</html>
